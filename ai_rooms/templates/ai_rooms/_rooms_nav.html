{# Shared cross-room navigation bar. Include this in each room template:
   {% include 'ai_rooms/_rooms_nav.html' with active='repair_atlas' %}    #}
<style>
    .rooms-nav {
        display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
        padding: 10px 16px; background: rgba(255,255,255,0.04);
        border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .rooms-nav a {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 7px 12px; border-radius: 999px;
        background: rgba(255,255,255,0.06); color: #cbd5e1;
        border: 1px solid rgba(255,255,255,0.1);
        text-decoration: none; font-size: 0.82rem; font-weight: 700;
        font-family: inherit; transition: all 0.15s;
    }
    .rooms-nav a:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .rooms-nav a.active {
        background: linear-gradient(135deg, #00d4ff, #6366f1);
        color: #fff; border-color: transparent;
    }
    .rooms-nav .sep { flex: 1; }
    .rooms-nav .history-link {
        color: #94a3b8; font-size: 0.78rem;
        background: transparent; border-color: transparent;
    }
    .rooms-nav .history-link:hover { color: #00d4ff; background: transparent; }
</style>
<nav class="rooms-nav">
    <a href="{% url 'ai_rooms:hub' %}" {% if active == 'hub' %}class="active"{% endif %}>🧠 الهب</a>
    <a href="{% url 'smart_diagnostics:diagnostics-room' %}" {% if active == 'diagnostic_room' %}class="active"{% endif %}>🩺 غرفة التشخيص</a>
    <a href="{% url 'diagnostic_shop' %}" {% if active == 'auto_diagnostic' %}class="active"{% endif %}>🚗 خبير التشخيص</a>
    <a href="{% url 'repair_atlas:page' %}" {% if active == 'repair_atlas' %}class="active"{% endif %}>🔧 أطلس الإصلاح</a>
    <span class="sep"></span>
    <a href="{% url 'ai_rooms:history' %}" class="history-link"><i class="fas fa-clock-rotate-left"></i> تاريخ المحادثات</a>
</nav>
