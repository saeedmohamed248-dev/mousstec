<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" font-family="system-ui,Arial,sans-serif">
  <rect x="0" y="0" width="420" height="260" rx="14" fill="#0f172a"/>
  <text x="210" y="30" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">FEM_F30 — Front Electronic Module</text>
  <text x="210" y="50" fill="#94a3b8" font-size="11" text-anchor="middle">Bench connector (MAC7242) — view from wiring side</text>

  <!-- connector body -->
  <rect x="40" y="80" width="340" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <!-- pins -->
  <g font-size="11" font-weight="700" text-anchor="middle">
    <circle cx="80"  cy="120" r="14" fill="#ef4444"/><text x="80"  cy="120" y="124" fill="#fff">1</text>
    <circle cx="140" cy="120" r="14" fill="#111827"/><text x="140" y="124" fill="#fff">2</text>
    <circle cx="200" cy="120" r="14" fill="#f97316"/><text x="200" y="124" fill="#fff">15</text>
    <circle cx="260" cy="120" r="14" fill="#92400e"/><text x="260" y="124" fill="#fff">16</text>
    <circle cx="320" cy="120" r="14" fill="#eab308"/><text x="320" y="124" fill="#111">18</text>
  </g>

  <!-- legend -->
  <g font-size="11" text-anchor="start">
    <rect x="60"  y="170" width="12" height="12" fill="#ef4444"/><text x="78"  y="180" fill="#e2e8f0">Pin 1 · 12V (KL30)</text>
    <rect x="60"  y="190" width="12" height="12" fill="#111827" stroke="#475569"/><text x="78" y="200" fill="#e2e8f0">Pin 2 · GND (KL31)</text>
    <rect x="230" y="170" width="12" height="12" fill="#f97316"/><text x="248" y="180" fill="#e2e8f0">Pin 15 · CAN-H</text>
    <rect x="230" y="190" width="12" height="12" fill="#92400e"/><text x="248" y="200" fill="#e2e8f0">Pin 16 · CAN-L</text>
    <rect x="230" y="210" width="12" height="12" fill="#eab308"/><text x="248" y="220" fill="#e2e8f0">Pin 18 · BOOT → GND (BSL)</text>
  </g>
</svg>
