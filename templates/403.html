<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — غير مصرح</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { text-align: center; max-width: 480px; padding: 3rem 2rem; }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 2rem; font-weight: 900; color: #f87171; margin-bottom: 0.5rem; }
        p { color: #94a3b8; font-size: 1rem; line-height: 1.8; margin-bottom: 1.5rem; }
        .hint { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 1rem; color: #fca5a5; font-size: 0.85rem; margin-bottom: 1.5rem; }
        a { display: inline-block; background: linear-gradient(135deg, #7c3aed, #6366f1); color: white; padding: 0.75rem 2rem; border-radius: 12px; text-decoration: none; font-weight: 700; transition: 0.3s; }
        a:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔒</div>
        <h1>403 — غير مصرح بالدخول</h1>
        <p>عذراً، لا يمكن تنفيذ هذا الطلب. قد يكون السبب انتهاء صلاحية الجلسة أو مشكلة في التحقق الأمني.</p>
        <div class="hint">
            جرّب تحديث الصفحة (Ctrl+Shift+R) أو مسح الكوكيز ثم أعد المحاولة.
        </div>
        <a href="/">العودة للرئيسية</a>
    </div>
</body>
</html>
