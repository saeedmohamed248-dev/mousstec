<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Mouss Tec</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #0f172a; }</style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center px-4">

<div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-purple-900/20 via-slate-900 to-slate-950 -z-10"></div>

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
        <a href="/" class="inline-flex items-center gap-3">
            <div class="bg-gradient-to-tr from-purple-600 to-indigo-600 p-3 rounded-2xl shadow-lg shadow-purple-500/30">
                <i class="fas fa-cubes text-2xl text-white"></i>
            </div>
            <span class="text-3xl font-black bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent">MOUSS TEC</span>
        </a>
        <p class="text-slate-400 text-sm mt-3">منصة إدارة الورش والسيارات الذكية</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900/80 border border-slate-700/60 backdrop-blur-xl rounded-2xl p-8 shadow-2xl shadow-indigo-900/20">
        <div class="text-center mb-6">
            <div class="w-14 h-14 mx-auto rounded-2xl bg-purple-500/10 border border-purple-500/20 flex items-center justify-center text-purple-400 text-2xl mb-4">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h1 class="text-xl font-black text-white">تسجيل الدخول</h1>
            <p class="text-slate-400 text-sm mt-1">أدخل بريدك الإلكتروني لإيجاد حسابك</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl px-4 py-3 text-sm font-bold text-center mb-5">
            <i class="fas fa-exclamation-triangle ml-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-black text-slate-400 mb-2">البريد الإلكتروني المسجل</label>
                <input type="email" name="email" required autofocus
                    placeholder="example@email.com"
                    class="w-full bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-3 text-white text-sm placeholder-slate-500 focus:outline-none focus:border-purple-500/60 focus:ring-1 focus:ring-purple-500/20 transition ltr-input"
                    dir="ltr">
            </div>
            <button type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-black py-3.5 rounded-xl shadow-lg shadow-purple-500/20 transition duration-300 flex items-center justify-center gap-2">
                <i class="fas fa-arrow-left"></i>
                ابحث عن حسابي
            </button>
        </form>

        <div class="mt-6 pt-5 border-t border-slate-800 text-center space-y-3">
            <p class="text-sm text-slate-500">مستخدم جديد؟</p>
            <a href="{% url 'saas_customer_signup' %}"
               class="inline-flex items-center gap-2 text-purple-400 hover:text-purple-300 font-bold text-sm transition">
                <i class="fas fa-rocket text-xs"></i>
                أنشئ حسابك مجاناً — 3 أيام تجريبية
            </a>
        </div>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">
        © 2026 Mouss Tec Ecosystem
    </p>
</div>

</body>
</html>
