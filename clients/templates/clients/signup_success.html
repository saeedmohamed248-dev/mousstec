<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم التأسيس بنجاح | Mouss Tec SaaS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #090d16 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .success-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 550px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .success-icon {
            font-size: 65px;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            width: 110px;
            height: 110px;
            line-height: 110px;
            border-radius: 50%;
            margin: 0 auto 25px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .url-box {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 16px;
            color: #38bdf8;
            word-break: break-all;
        }
        .btn-enter {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none; color: white !important; font-weight: 700;
            padding: 14px 28px; border-radius: 12px; text-decoration: none;
            display: inline-flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body>

<div class="success-card">
    <div class="success-icon"><i class="fas fa-check-circle"></i></div>
    <h2 class="font-weight-bold mb-2">تهانينا يا هندسة!</h2>
    <h4 class="text-muted mb-4" style="color: #a7f3d0 !important;">تم تخليق مؤسسة "{{ company_name }}" بنجاح</h4>
    
    <p class="text-secondary mb-4" style="font-size: 15px;">قام محرك Mouss Tec السحابي ببناء جداول قاعدة البيانات المعزولة، وتعيين حساب الـ Root الخاص بك بنجاح. يمكنك الآن الانتقال الفوري لإدارة إمبراطوريتك.</p>
    
    <div class="mb-4">
        <label class="text-muted d-block mb-2 font-weight-bold" style="font-size: 13px;">رابط الدخول الآمن لنظامك:</label>
        <div class="url-box shadow-sm">{{ target_url }}</div>
    </div>

    <div class="mb-3 text-secondary" style="font-size: 13px;">
        <i class="fas fa-user"></i> حساب الأدمن: <b class="text-white">{{ admin_email }}</b>
    </div>

    <a href="{{ target_url }}" class="btn btn-enter mt-2">
        <i class="fas fa-door-open"></i> دخول لوحة التحكم والعمليات
    </a>
</div>

</body>
</html>
