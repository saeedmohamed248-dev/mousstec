{# Reusable live password-strength meter — usage: include with `target_id="id_password"` #}
<div id="pw-strength-{{ target_id }}" class="mt-2 hidden">
    <div class="flex gap-1 h-1.5">
        <div data-bar="1" class="flex-1 rounded-full bg-slate-700 transition"></div>
        <div data-bar="2" class="flex-1 rounded-full bg-slate-700 transition"></div>
        <div data-bar="3" class="flex-1 rounded-full bg-slate-700 transition"></div>
        <div data-bar="4" class="flex-1 rounded-full bg-slate-700 transition"></div>
    </div>
    <div class="flex items-center justify-between mt-1">
        <span data-label class="text-[11px] font-bold text-slate-500">قوة كلمة السر</span>
        <span data-tips class="text-[10px] text-slate-500"></span>
    </div>
</div>
<script>
(function(){
  var input = document.getElementById("{{ target_id }}");
  var wrap = document.getElementById("pw-strength-{{ target_id }}");
  if(!input || !wrap) return;
  var bars = wrap.querySelectorAll("[data-bar]");
  var lbl = wrap.querySelector("[data-label]");
  var tips = wrap.querySelector("[data-tips]");
  var levels = [
    {label:"ضعيفة جداً", color:"bg-red-500",    txt:"text-red-400"},
    {label:"ضعيفة",       color:"bg-orange-500", txt:"text-orange-400"},
    {label:"متوسطة",      color:"bg-amber-500",  txt:"text-amber-400"},
    {label:"قوية",        color:"bg-lime-500",   txt:"text-lime-400"},
    {label:"ممتازة",      color:"bg-emerald-500",txt:"text-emerald-400"},
  ];
  function score(v){
    if(!v) return -1;
    var s=0;
    if(v.length>=8) s++;
    if(v.length>=12) s++;
    if(/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
    if(/\d/.test(v)) s++;
    if(/[^A-Za-z0-9]/.test(v)) s++;
    if(/^\d+$/.test(v)) s=Math.min(s,1);
    return Math.min(s,4);
  }
  function need(v){
    var miss=[];
    if(v.length<8) miss.push("8 أحرف+");
    if(!/[A-Z]/.test(v)) miss.push("حرف كابيتال");
    if(!/\d/.test(v)) miss.push("رقم");
    if(!/[^A-Za-z0-9]/.test(v)) miss.push("رمز");
    return miss.slice(0,2).join(" · ");
  }
  input.addEventListener("input", function(){
    var v=input.value||"";
    if(!v){ wrap.classList.add("hidden"); return; }
    wrap.classList.remove("hidden");
    var s=score(v);
    var lv=levels[Math.max(s,0)];
    bars.forEach(function(b,i){
      b.className = "flex-1 rounded-full transition h-1.5 " + (i<=s ? lv.color : "bg-slate-700");
    });
    lbl.textContent = lv.label;
    lbl.className = "text-[11px] font-bold " + lv.txt;
    tips.textContent = s>=3 ? "" : ("ينقص: " + need(v));
  });
})();
</script>
