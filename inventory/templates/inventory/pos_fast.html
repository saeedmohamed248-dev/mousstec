<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع السريعة | Mouss Tec POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; }
        .card-hover { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139,92,246,0.12); }
        input:focus { outline: none; box-shadow: 0 0 0 2px rgba(139,92,246,0.5); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">

    <nav class="bg-slate-900/90 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-purple-600 to-indigo-600 p-2 rounded-xl">
                    <i class="fas fa-cash-register text-white"></i>
                </div>
                <span class="text-lg font-black bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent">نقطة البيع</span>
            </div>
            <div class="flex items-center gap-3">
                <a href="/system/dashboard/" class="text-xs font-bold text-slate-400 hover:text-purple-400 transition px-3 py-1.5 rounded-lg border border-slate-700"><i class="fas fa-arrow-right ml-1"></i>العودة</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 flex-1">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- Search & Products -->
            <div class="lg:col-span-2 space-y-4">
                <div class="relative">
                    <input type="text" id="barcode-input" placeholder="امسح الباركود أو ابحث باسم القطعة..."
                        class="w-full bg-slate-900/60 border border-slate-700 focus:border-purple-500 rounded-2xl px-5 py-4 text-white placeholder-slate-500 text-sm"
                        autofocus>
                    <button onclick="searchProduct()" class="absolute left-3 top-1/2 -translate-y-1/2 bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-xl text-xs font-bold transition">
                        <i class="fas fa-search ml-1"></i>بحث
                    </button>
                </div>

                <div id="search-results" class="bg-slate-900/60 border border-slate-800 rounded-2xl p-4 min-h-[200px]">
                    <p class="text-center text-slate-600 py-10"><i class="fas fa-barcode text-4xl mb-3 block"></i>امسح الباركود أو ابحث عن قطعة غيار</p>
                </div>
            </div>

            <!-- Cart -->
            <div class="space-y-4">
                <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-5">
                    <h3 class="text-sm font-black text-white mb-4 flex items-center gap-2"><i class="fas fa-shopping-cart text-purple-400"></i> سلة الفاتورة</h3>
                    <div id="cart-items" class="space-y-2 min-h-[150px]">
                        <p class="text-center text-slate-600 py-6 text-sm">السلة فارغة</p>
                    </div>
                    <hr class="border-slate-800 my-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm font-bold text-slate-400">الإجمالي</span>
                        <span id="cart-total" class="text-2xl font-black text-emerald-400">0.00 ج.م</span>
                    </div>
                    <button onclick="submitInvoice()" class="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white font-black py-3 rounded-xl text-sm transition shadow-lg shadow-emerald-500/20">
                        <i class="fas fa-check-circle ml-2"></i>اعتماد الفاتورة
                    </button>
                </div>
            </div>
        </div>
    </main>

<script>
function searchProduct() {
    const code = document.getElementById('barcode-input').value.trim();
    if (!code) return;
    fetch(`/system/api/v1/barcode-lookup/?code=${encodeURIComponent(code)}`)
        .then(r => r.json())
        .then(data => {
            const el = document.getElementById('search-results');
            if (data.error) { el.innerHTML = `<p class="text-center text-red-400 py-10">${data.error}</p>`; return; }
            el.innerHTML = `
                <div class="flex items-center justify-between p-3 bg-slate-800/40 rounded-xl">
                    <div><p class="font-bold text-white text-sm">${data.name}</p><p class="text-xs text-slate-500">P/N: ${data.part_number} | المتاح: ${data.available_qty}</p></div>
                    <div class="flex items-center gap-3"><span class="text-emerald-400 font-black">${data.price} ج.م</span>
                    <button onclick="addToCart('${data.id}','${data.name}',${data.price})" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition"><i class="fas fa-plus"></i></button></div>
                </div>`;
        }).catch(() => { document.getElementById('search-results').innerHTML = '<p class="text-center text-red-400 py-10">خطأ في الاتصال</p>'; });
}
document.getElementById('barcode-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchProduct(); });
let cart = [];
function addToCart(id, name, price) { cart.push({id, name, price, qty: 1}); renderCart(); }
function renderCart() {
    const el = document.getElementById('cart-items');
    if (!cart.length) { el.innerHTML = '<p class="text-center text-slate-600 py-6 text-sm">السلة فارغة</p>'; document.getElementById('cart-total').textContent = '0.00 ج.م'; return; }
    el.innerHTML = cart.map((item, i) => `<div class="flex items-center justify-between bg-slate-800/40 rounded-xl p-2.5"><div><p class="text-sm font-bold text-white">${item.name}</p><p class="text-xs text-slate-500">${item.price} ج.م × ${item.qty}</p></div><button onclick="cart.splice(${i},1);renderCart();" class="text-red-400 hover:text-red-300 text-xs"><i class="fas fa-trash"></i></button></div>`).join('');
    document.getElementById('cart-total').textContent = cart.reduce((s, i) => s + i.price * i.qty, 0).toFixed(2) + ' ج.م';
}
function submitInvoice() { if (!cart.length) return; alert('سيتم ربط هذا الزر بنظام إنشاء الفواتير الآلي.'); }
</script>
</body>
</html>
