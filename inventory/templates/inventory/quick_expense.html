{% extends "inventory/_base_portal.html" %}
{% block title %}💸 تسجيل مصروف{% endblock %}

{% block content %}
<header class="flex items-center justify-between mb-5">
  <h1 class="text-2xl sm:text-3xl font-black flex items-center gap-3">
    <span class="text-rose-400"><i class="fas fa-money-bill-trend-up"></i></span>
    تسجيل مصروف سريع
    {% if branch %}<span class="text-xs font-bold bg-slate-800 px-3 py-1 rounded-full text-slate-300">{{ branch.name }}</span>{% endif %}
  </h1>
  <a href="{% url 'inventory:dashboard' %}" class="text-xs font-bold text-slate-400 hover:text-white"><i class="fas fa-home ml-1"></i>الرئيسية</a>
</header>

<form id="exp-form" class="bg-slate-800/60 backdrop-blur rounded-2xl p-6 border border-slate-700/50 space-y-4 max-w-xl mx-auto">
  <div>
    <label class="block text-xs font-bold text-slate-300 mb-1">المبلغ *</label>
    <input name="amount" type="number" step="0.01" min="0.01" required
           class="w-full bg-slate-900 text-white text-2xl font-black px-3 py-3 rounded-lg border border-slate-700 focus:border-rose-400 focus:outline-none text-center">
  </div>

  <div>
    <label class="block text-xs font-bold text-slate-300 mb-1">الخزنة (يُخصم منها) *</label>
    <select name="treasury_id" required class="w-full bg-slate-900 text-white px-3 py-2.5 rounded-lg border border-slate-700 focus:border-rose-400 focus:outline-none">
      <option value="">— اختر الخزنة —</option>
      {% for t in treasuries %}<option value="{{ t.id }}">{{ t.name }} ({{ t.get_type_display }}) — رصيد: {{ t.balance|floatformat:2 }}</option>{% endfor %}
    </select>
  </div>

  <div>
    <label class="block text-xs font-bold text-slate-300 mb-1">البند / التصنيف</label>
    <select name="category_id" class="w-full bg-slate-900 text-white px-3 py-2.5 rounded-lg border border-slate-700 focus:border-rose-400 focus:outline-none">
      <option value="">— بدون تصنيف —</option>
      {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
    </select>
  </div>

  <div>
    <label class="block text-xs font-bold text-slate-300 mb-1">البيان / الملاحظات</label>
    <textarea name="description" rows="2" placeholder="مثال: شراء قهوة للعملاء" class="w-full bg-slate-900 text-white px-3 py-2.5 rounded-lg border border-slate-700 focus:border-rose-400 focus:outline-none"></textarea>
  </div>

  <button type="submit" class="w-full bg-gradient-to-r from-rose-600 to-amber-600 hover:from-rose-500 hover:to-amber-500 text-white text-lg font-black py-4 rounded-xl shadow-lg disabled:opacity-40">
    <i class="fas fa-minus-circle"></i> تسجيل المصروف
  </button>
  <p id="msg" class="text-sm text-center"></p>
</form>
{% endblock %}

{% block scripts %}
<script>
const csrf = document.querySelector('[name=csrfmiddlewaretoken]').value;
const URL = "{% url 'inventory:quick_expense_create' %}";
document.getElementById('exp-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]'); btn.disabled = true;
  const msg = document.getElementById('msg');
  msg.className = 'text-sm text-center text-slate-300'; msg.textContent = 'جارٍ الحفظ...';
  try {
    const r = await fetch(URL, { method:'POST', headers:{'X-CSRFToken':csrf}, body: new FormData(e.target) });
    const data = await r.json();
    if (!r.ok || !data.ok) { msg.className = 'text-sm text-center text-red-400'; msg.textContent = data.error || 'فشل التسجيل.'; btn.disabled = false; return; }
    msg.className = 'text-sm text-center text-emerald-400 font-bold';
    msg.textContent = `تم تسجيل المصروف #${data.transaction_id} — رصيد الخزنة الجديد: ${data.new_balance.toFixed(2)}`;
    e.target.reset();
    btn.disabled = false;
    e.target.querySelector('[name=amount]').focus();
  } catch { msg.className = 'text-sm text-center text-red-400'; msg.textContent = 'خطأ في الشبكة.'; btn.disabled = false; }
});
</script>
{% endblock %}
